name: Process Form Submissions

on:
  workflow_dispatch:
  # schedule:
    # Runs every hour
    # - cron: '0 * * * *'

jobs:
  process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread google-auth google-api-python-client requests
    
    - name: Create PDF output directory
      run: mkdir -p pdf_out
    
    - name: Run data calculation
      id: data_calc
      env:
        SHEET_ID: ${{ secrets.SHEET_ID }}
        GSA_CREDENTIALS: ${{ secrets.GSA_CREDENTIALS }}
        EMAIL_TO_FILIAL: ${{ secrets.EMAIL_TO_FILIAL }}
      run: |
        python scripts/data_calc.py > output.txt
        cat output.txt
        
        # Extract NEW_FILIAIS_JSON from output
        NEW_FILIAIS_JSON=$(grep "^NEW_FILIAIS_JSON=" output.txt | cut -d'=' -f2-)
        echo "NEW_FILIAIS_JSON=$NEW_FILIAIS_JSON" >> $GITHUB_ENV
    
    - name: Send emails if there are new submissions
      if: env.NEW_FILIAIS_JSON != '[]'
      env:
        SHEET_ID: ${{ secrets.SHEET_ID }}
        GSA_CREDENTIALS: ${{ secrets.GSA_CREDENTIALS }}
        NEW_FILIAIS_JSON: ${{ env.NEW_FILIAIS_JSON }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      run: |
        echo "New submissions detected for: $NEW_FILIAIS_JSON"
        python scripts/send_email.py
